name: Build Othello

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        run: |
          if (-not (Test-Path "C:\vcpkg\vcpkg.exe")) {
            Write-Host "Cloning vcpkg..."
            git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
            & "C:\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          }

      - name: Install raylib
        run: C:\vcpkg\vcpkg install raylib:x64-windows-static --classic

      - name: Clean build directory
        run: Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue

      - name: Configure CMake
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          $dist = "Othello-Windows"
          New-Item -ItemType Directory -Force -Path $dist
          Copy-Item "build/Release/othello.exe" -Destination $dist/
          Copy-Item -Recurse "assets" -Destination $dist/

          Compress-Archive -Path "$dist/*" -DestinationPath "Othello-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Othello-Windows
          path: Othello-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install raylib

      - name: Build
        run: |
          cd ${{ github.workspace }}
          make clean
          make -j4

      - name: Package
        run: |
          DIST="Othello-macOS"
          mkdir -p "$DIST"
          cp othello "$DIST/"
          cp -r assets "$DIST/"
          zip -r Othello-macOS.zip "$DIST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Othello-macOS
          path: Othello-macOS.zip
