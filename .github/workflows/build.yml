name: Build Othello

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Download raylib (official MSVC release)
        run: |
          curl -L -o raylib.zip https://github.com/raysan5/raylib/releases/download/5.5/raylib-5.5_win64_msvc16.zip
          Expand-Archive -Path raylib.zip -DestinationPath raylib_extracted -Force
          New-Item -ItemType Directory -Force -Path lib/raylib
          Copy-Item -Recurse "raylib_extracted/raylib-5.5_win64_msvc16/*" -Destination lib/raylib/

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          $dist = "Othello-Windows"
          New-Item -ItemType Directory -Force -Path "$dist"
          Copy-Item "build/Release/*.exe", "build/Release/*.dll" -Destination "$dist/"
          Copy-Item -Recurse "assets" -Destination "$dist/"
          Compress-Archive -Path "$dist/*" -DestinationPath "Othello-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Othello-Windows
          path: Othello-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install raylib

      - name: Build
        run: |
          cd ${{ github.workspace }}
          make clean
          make -j4

      - name: Package
        run: |
          DIST="Othello-macOS"
          mkdir -p "$DIST"
          cp othello "$DIST/"
          cp -r assets "$DIST/"
          zip -r Othello-macOS.zip "$DIST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Othello-macOS
          path: Othello-macOS.zip